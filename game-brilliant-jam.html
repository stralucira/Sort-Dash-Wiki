<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Brilliant Jam - Machina Games</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: sans-serif;
    width: 100%;
}

canvas {
    display: block;
    touch-action: none;
    cursor: pointer;
    border: 1px solid #333;
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    max-width: 100%;
    height: auto;
    width: 420px;
}

#pw-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 10;
}
#pw-overlay.visible { display: flex; }

#pw-modal {
    background: #16213e;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 260px;
    text-align: center;
    color: #eee;
    font-family: sans-serif;
}
#pw-modal p { font-size: 16px; margin: 0; }
#pw-input {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #555;
    background: #0f3460;
    color: #fff;
    font-size: 16px;
    outline: none;
    text-align: center;
}
#pw-buttons { display: flex; gap: 10px; justify-content: center; }
#pw-buttons button {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
    cursor: pointer;
}
#pw-cancel { background: #444; color: #ccc; }
#pw-submit { background: #e94560; color: #fff; }

@keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-6px); }
    80%      { transform: translateX(6px); }
}
#pw-modal.shake { animation: shake 0.35s ease; }
</style>
</head>

const _I=100000;
async function _decrypt(pw){
  const raw=Uint8Array.from(atob(_E),c=>c.charCodeAt(0));
  const salt=raw.slice(0,16),iv=raw.slice(16,28);
  const payload=raw.slice(28);
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt,iterations:_I,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']
  );
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,payload);
  return new TextDecoder().decode(plain);
}
window.addEventListener('message',async e=>{
  if(e.data&&e.data.type==='key'){
    try{
      const code=await _decrypt(e.data.key);
      eval(code);
    }catch(err){
      console.error('Decrypt failed:',err);
    }
  }
});
if(window!==window.parent)parent.postMessage({type:'ready'},'*');
