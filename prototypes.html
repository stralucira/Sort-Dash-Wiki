<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prototypes - Machina</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #1a1a2e;
    color: #e2e4ea;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 56px;
  }

  /* ── SELECTOR ── */
  #selector {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
    width: 100%;
    max-width: 600px;
  }
  #selector h1 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 14px;
    color: #6b7084;
    margin-bottom: 36px;
  }
  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
    width: 100%;
    margin-bottom: 32px;
  }
  .game-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 28px 16px;
    background: #16213e;
    border: 1px solid #252836;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    font-family: 'DM Sans', sans-serif;
    color: #e2e4ea;
  }
  .game-card:hover { background: #1c2a4a; border-color: #3a4060; transform: translateY(-2px); }
  .game-card:active { transform: translateY(0); }
  .game-icon { font-size: 36px; }
  .game-title { font-weight: 600; font-size: 16px; }
  .game-desc { font-size: 12px; color: #6b7084; text-align: center; }

  .unlock-btn {
    padding: 12px 32px;
    border-radius: 10px;
    border: 1px solid #444;
    background: #16213e;
    color: #ccc;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s;
  }
  .unlock-btn:hover { background: #1c2a4a; }
  .unlock-btn.unlocked { border-color: #2ED573; color: #2ED573; cursor: default; }

  /* ── GAME HOST ── */
  #game-host {
    display: none;
    justify-content: center;
    align-items: flex-start;
    flex: 1;
    width: 100%;
    padding: 8px;
    position: relative;
  }
  #game-frame {
    border: none;
    width: 420px;
    max-width: 100%;
    height: calc(100vh - 64px);
    max-height: 820px;
    border-radius: 8px;
    background: #1a1a2e;
  }
  #back-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    z-index: 50;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid #444;
    background: rgba(22,33,62,0.9);
    color: #ccc;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  #back-btn:hover { background: rgba(44,55,80,0.95); color: #fff; }

  /* ── PASSWORD OVERLAY ── */
  #pw-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
    z-index: 200;
  }
  #pw-overlay.visible { display: flex; }
  #pw-modal {
    background: #16213e;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 260px;
    text-align: center;
    color: #eee;
  }
  #pw-modal p { font-size: 16px; margin: 0; }
  #pw-input {
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid #555;
    background: #0f3460;
    color: #fff;
    font-size: 16px;
    outline: none;
    text-align: center;
  }
  #pw-buttons { display: flex; gap: 10px; justify-content: center; }
  #pw-buttons button {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    font-size: 15px;
    cursor: pointer;
  }
  #pw-cancel { background: #444; color: #ccc; }
  #pw-submit { background: #e94560; color: #fff; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-8px); }
    40%      { transform: translateX(8px); }
    60%      { transform: translateX(-6px); }
    80%      { transform: translateX(6px); }
  }
  #pw-modal.shake { animation: shake 0.35s ease; }

  /* ── SITE NAV ── */
  .site-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 48px;
    background: #181a24;
    border-bottom: 1px solid #252836;
    font-family: 'DM Sans', sans-serif;
  }
  .site-nav-title {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .site-nav-links { display: flex; gap: 4px; }
  .site-nav-link {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #6b7084;
    text-decoration: none;
    transition: background 0.15s, color 0.15s;
  }
  .site-nav-link:hover { color: #e2e4ea; background: rgba(255,255,255,0.05); }
  .site-nav-link.active { color: #e2e4ea; background: rgba(99,132,255,0.12); }
</style>
</head>
<body>
<nav class="site-nav">
  <span class="site-nav-title">Machina</span>
  <div class="site-nav-links">
    <a href="index.html" class="site-nav-link">Machina Core</a>
    <a href="sort-dash.html" class="site-nav-link">Sort Dash</a>
    <a href="prototypes.html" class="site-nav-link active">Prototypes</a>
  </div>
</nav>

<div id="selector">
  <h1>Prototypes</h1>
  <p class="subtitle">Machina Games</p>
  <div class="game-grid">
    <button class="game-card" data-game="game-loop-jam.html">
      <span class="game-icon">&#x1F504;</span>
      <span class="game-title">Loop Jam</span>
      <span class="game-desc">Route passengers around the loop</span>
    </button>
    <button class="game-card" data-game="game-sort-jam.html">
      <span class="game-icon">&#x1F500;</span>
      <span class="game-title">Sort Jam</span>
      <span class="game-desc">Sort passengers by color</span>
    </button>
  </div>
  <button id="unlock-btn" class="unlock-btn">&#x1F512; Unlock</button>
</div>

<div id="game-host">
  <iframe id="game-frame" allow="fullscreen" sandbox="allow-scripts allow-same-origin"></iframe>
  <button id="back-btn" title="Back to selector">&#x2715;</button>
</div>

<div id="pw-overlay">
  <div id="pw-modal">
    <p>Enter password</p>
    <input id="pw-input" type="password" autocomplete="off" maxlength="20" placeholder="password">
    <div id="pw-buttons">
      <button id="pw-cancel">Cancel</button>
      <button id="pw-submit">Unlock</button>
    </div>
  </div>
</div>

<script>
const selector=document.getElementById('selector');
const gameHost=document.getElementById('game-host');
const gameFrame=document.getElementById('game-frame');
const backBtn=document.getElementById('back-btn');
const siteNav=document.querySelector('.site-nav');
const unlockBtn=document.getElementById('unlock-btn');
const isMobile='ontouchstart' in window||navigator.maxTouchPoints>0;
let unlocked=false;
let pendingGame=null;

// Game card click
document.querySelectorAll('.game-card').forEach(card=>{
  card.addEventListener('click',()=>{
    const src=card.dataset.game;
    if(!unlocked){pendingGame=src;showPwPrompt();return;}
    loadGame(src);
  });
});

function loadGame(src){
  selector.style.display='none';
  gameHost.style.display='flex';
  gameFrame.src=src;
}

// Back to selector
backBtn.addEventListener('click',backToSelector);
function backToSelector(){
  gameFrame.src='';
  gameHost.style.display='none';
  selector.style.display='flex';
  siteNav.style.display='';
  document.body.style.paddingTop='';
  if(isMobile&&document.fullscreenElement)document.exitFullscreen().catch(()=>{});
}

// Listen for postMessage from game iframes
window.addEventListener('message',e=>{
  if(!e.data||!e.data.type)return;
  if(e.data.type==='ready'){
    gameFrame.contentWindow.postMessage({type:'key',key:PW},'*');
    return;
  }
  if(e.data.type==='enterGameplay'){
    siteNav.style.display='none';
    document.body.style.paddingTop='0';
    backBtn.style.display='none';
    if(isMobile){
      const el=document.documentElement;
      if(el.requestFullscreen)el.requestFullscreen().catch(()=>{});
      else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();
    }
  }
  if(e.data.type==='exitGameplay'){
    if(isMobile){
      if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});
      else if(document.webkitFullscreenElement)document.webkitExitFullscreen();
    }
    siteNav.style.display='';
    document.body.style.paddingTop='';
    backBtn.style.display='';
  }
});

// Fullscreen change handler
function onFSChange(){
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    siteNav.style.display='';
    document.body.style.paddingTop='';
    backBtn.style.display='';
  }
}
document.addEventListener('fullscreenchange',onFSChange);
document.addEventListener('webkitfullscreenchange',onFSChange);

// Password unlock
const PW=atob('Z2FtZS5tYWNoaW5l');
const pwOverlay=document.getElementById('pw-overlay');
const pwInput=document.getElementById('pw-input');
const pwModal=document.getElementById('pw-modal');
function showPwPrompt(){pwInput.value='';pwOverlay.classList.add('visible');setTimeout(()=>pwInput.focus(),50);}
function hidePwPrompt(){pwOverlay.classList.remove('visible');}
function submitPw(){
  if(pwInput.value===PW){
    unlocked=true;
    hidePwPrompt();
    unlockBtn.textContent='\u{1F513} Unlocked';
    unlockBtn.classList.add('unlocked');
    if(pendingGame){loadGame(pendingGame);pendingGame=null;}
  } else {
    pwModal.classList.add('shake');
    pwModal.addEventListener('animationend',()=>{pwModal.classList.remove('shake');pwInput.value='';pwInput.focus();},{once:true});
  }
}
unlockBtn.addEventListener('click',()=>{if(!unlocked)showPwPrompt();});
document.getElementById('pw-submit').addEventListener('click',submitPw);
document.getElementById('pw-cancel').addEventListener('click',hidePwPrompt);
pwInput.addEventListener('keydown',e=>{if(e.key==='Enter')submitPw();});
</script>
</body>
</html>
